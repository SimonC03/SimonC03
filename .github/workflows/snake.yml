name: Generate Snake

on:
  # Kör automatiskt varje natt
  schedule:
    - cron: "0 0 * * *" 
  
  # Tillåter dig att köra den manuellt när du vill
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: 
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          # Ditt GitHub-namn
          github_user_name: SimonC03
          # Här skapas bilderna (en för ljus, en för mörk)
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
